version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lms_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-lms_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lmsadmin@01}
      POSTGRES_DB: ${DB_NAME:-lms_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lms_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms_network
    restart: unless-stopped

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: lms_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis@secure}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis@secure}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms_network
    restart: unless-stopped

  # Node.js API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lms_api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-lms_admin}
      DB_PASSWORD: ${DB_PASSWORD:-lmsadmin@01}
      DB_NAME: ${DB_NAME:-lms_db}
      DATABASE_URL: postgresql://${DB_USER:-lms_admin}:${DB_PASSWORD:-lmsadmin@01}@postgres:5432/${DB_NAME:-lms_db}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis@secure}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_key_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your_super_refresh_secret_key_change_in_production}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /app/logs
      
      # Email (optional)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-your_email@gmail.com}
      SMTP_FROM: ${SMTP_FROM:-noreply@lms.edu}
      
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./logs:/app/logs
      - ./storage:/app/storage
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lms_network
    restart: unless-stopped
    command: npm run start

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  lms_network:
    driver: bridge
